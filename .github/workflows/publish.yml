name: Publish

on:
  workflow_run:
    workflows:
      - Build Release
    types:
      - completed

jobs:
  publish:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - run: |
          echo "=== github context ==="
          echo "github.ref=${{ github.ref }}"
          echo "github.sha=${{ github.sha }}"
          echo "github.workflow_ref=${{ github.workflow_ref }}"
          echo "github.workflow_sha=${{ github.workflow_sha }}"
          echo "github.event_name=${{ github.event_name }}"

          echo "=== event.workflow_run scalars ==="
          echo "event.workflow_run.id=${{ github.event.workflow_run.id }}"
          echo "event.workflow_run.name=${{ github.event.workflow_run.name }}"
          echo "event.workflow_run.event=${{ github.event.workflow_run.event }}"
          echo "event.workflow_run.status=${{ github.event.workflow_run.status }}"
          echo "event.workflow_run.conclusion=${{ github.event.workflow_run.conclusion }}"
          echo "event.workflow_run.ref=${{ github.event.workflow_run.ref }}"
          echo "event.workflow_run.head_branch=${{ github.event.workflow_run.head_branch }}"
          echo "event.workflow_run.head_sha=${{ github.event.workflow_run.head_sha }}"
          echo "event.workflow_run.path=${{ github.event.workflow_run.path }}"
          echo "event.workflow_run.display_title=${{ github.event.workflow_run.display_title }}"
          echo "event.workflow_run.run_number=${{ github.event.workflow_run.run_number }}"
          echo "event.workflow_run.run_attempt=${{ github.event.workflow_run.run_attempt }}"
          echo "event.workflow_run.workflow_id=${{ github.event.workflow_run.workflow_id }}"

          echo "=== event.workflow_run full JSON ==="
          cat << 'EOF'
          ${{ toJSON(github.event.workflow_run) }}
          EOF
